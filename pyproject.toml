[project]
name = "shannon"
version = "0.2.0"
description = "AI VTuber powered by Claude"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "anthropic>=0.40.0",
]

[project.optional-dependencies]
computer = ["pyautogui>=0.9.54"]
vision = ["mss>=9.0.0", "opencv-python>=4.9.0", "Pillow>=10.0.0"]
tts = ["piper-tts>=1.2.0"]
stt = ["faster-whisper>=1.0.0"]
vtuber = ["websockets>=12.0"]
messaging = ["discord.py>=2.3.0"]
all = ["shannon[computer,vision,tts,stt,vtuber,messaging]"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
shannon = "shannon.app:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["shannon*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
